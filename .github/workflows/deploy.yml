name: Desplegar Picodavi en Hostinger

# Reintento de publicación: 2026-07-19 13:36 CEST

# Compila la web nueva de Next.js sin basePath y la publica en la raíz de
# picodavi.com. /beta y las demos sectoriales se conservan expresamente.
on:
  push:
    branches: [main]
    paths:
      - "web-next/**"
      - "Picodavi/plantillas/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: picodavi-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-next/package-lock.json

      - name: Instalar, comprobar y compilar producción
        working-directory: web-next
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

      - name: Conservar las demos sectoriales
        run: |
          cp -R Picodavi/plantillas web-next/out/plantillas
          test -f web-next/out/plantillas/brasa/index.html
          test -f web-next/out/plantillas/clinica/index.html
          test -f web-next/out/plantillas/estetica/index.html
          test -f web-next/out/plantillas/hotel-rural/index.html
          grep -q 'ErrorDocument 404 /404.html' web-next/out/.htaccess

      - name: Subir la web por FTPS a Hostinger (intento 1/3)
        id: deploy_ftp_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./web-next/out/
          server-dir: /domains/picodavi.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            beta/**
            **/beta/**

      - name: Esperar antes de reintentar
        if: steps.deploy_ftp_1.outcome == 'failure'
        run: sleep 15

      - name: Subir la web por FTPS a Hostinger (intento 2/3)
        id: deploy_ftp_2
        if: steps.deploy_ftp_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./web-next/out/
          server-dir: /domains/picodavi.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            beta/**
            **/beta/**

      - name: Esperar antes del último intento
        if: steps.deploy_ftp_1.outcome == 'failure' && steps.deploy_ftp_2.outcome == 'failure'
        run: sleep 30

      - name: Subir la web por FTPS a Hostinger (intento 3/3)
        id: deploy_ftp_3
        if: steps.deploy_ftp_1.outcome == 'failure' && steps.deploy_ftp_2.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./web-next/out/
          server-dir: /domains/picodavi.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            beta/**
            **/beta/**

      - name: Confirmar resultado del despliegue
        if: steps.deploy_ftp_1.outcome == 'failure' && steps.deploy_ftp_2.outcome == 'failure' && steps.deploy_ftp_3.outcome == 'failure'
        run: |
          echo "Los tres intentos de conexión FTPS con Hostinger han fallado."
          exit 1
