name: Desplegar Picodavi en Hostinger

# Cada vez que se sube un cambio a "main" que toque la carpeta Picodavi/,
# este robot sube automáticamente la web a Hostinger por FTP.
on:
  push:
    branches: [main]
    paths:
      - "Picodavi/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña "Actions"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Subir la web por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # Solo se publica el contenido de la carpeta Picodavi/ ...
          local-dir: ./Picodavi/
          # ... y va al docroot REAL del dominio picodavi.com en Hostinger.
          # (Verificado por diagnóstico FTP: el dominio se sirve desde aquí,
          #  no desde /public_html/, que es el de la cuenta principal.)
          server-dir: /domains/picodavi.com/public_html/
          # NO se publican los archivos internos (leads, guías, presupuestos, etc.)
          exclude: |
            **/.git*
            **/.git*/**
            **/.claude/**
            **/docs/**
            **/README.md
            **/package-lock.json
