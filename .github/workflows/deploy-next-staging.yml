name: Deploy Next (staging /beta)

# Compila la web nueva (Next.js) y la sube a una subcarpeta /beta de Hostinger.
# NO toca la web de producción (raíz). Solo se dispara desde la rama `next`.
# (El FTP de Hostinger falla a veces por red; basta con relanzar.)
on:
  push:
    branches: [next]
    paths:
      - "web-next/**"
      - ".github/workflows/deploy-next-staging.yml"
  workflow_dispatch: {}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Preparar Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-next/package-lock.json

      - name: Instalar y compilar (export estático con basePath /beta)
        working-directory: web-next
        env:
          STAGING: "1"
        run: |
          npm ci
          npm run build

      - name: Adaptar la página 404 al subdirectorio /beta
        working-directory: web-next
        run: |
          sed -i 's#ErrorDocument 404 /404.html#ErrorDocument 404 /beta/404.html#' out/.htaccess
          grep -q 'ErrorDocument 404 /beta/404.html' out/.htaccess

      - name: Subir a /beta por FTP (intento 1/3)
        id: deploy_ftp_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web-next/out/
          server-dir: /domains/picodavi.com/public_html/beta/

      - name: Esperar antes de reintentar
        if: steps.deploy_ftp_1.outcome == 'failure'
        run: sleep 15

      - name: Subir a /beta por FTP (intento 2/3)
        id: deploy_ftp_2
        if: steps.deploy_ftp_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web-next/out/
          server-dir: /domains/picodavi.com/public_html/beta/

      - name: Esperar antes del último intento
        if: steps.deploy_ftp_1.outcome == 'failure' && steps.deploy_ftp_2.outcome == 'failure'
        run: sleep 30

      - name: Subir a /beta por FTP (intento 3/3)
        id: deploy_ftp_3
        if: steps.deploy_ftp_1.outcome == 'failure' && steps.deploy_ftp_2.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web-next/out/
          server-dir: /domains/picodavi.com/public_html/beta/

      - name: Confirmar resultado del despliegue
        if: steps.deploy_ftp_1.outcome == 'failure' && steps.deploy_ftp_2.outcome == 'failure' && steps.deploy_ftp_3.outcome == 'failure'
        run: |
          echo "Los tres intentos de conexión FTP con Hostinger han fallado."
          exit 1


