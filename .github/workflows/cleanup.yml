name: Limpieza de archivos internos (temporal)

# Se lanza a mano. Borra del docroot real de picodavi.com los archivos
# internos que quedaron de una subida manual antigua (docs, README, configs).
# No toca nada publico de la web. Se puede borrar este workflow despues.
on:
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Borrar internos del docroot y verificar
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'PY'
          import ftplib, os
          h = os.environ["FTP_HOST"]; u = os.environ["FTP_USER"]; p = os.environ["FTP_PASSWORD"]
          ROOT = "/domains/picodavi.com/public_html"
          f = ftplib.FTP_TLS(); f.connect(h, 21, timeout=40); f.login(u, p); f.prot_p()

          def rm_file(path):
              try:
                  f.delete(path); print("  borrado archivo:", path)
              except Exception as e:
                  print("  (no habia / no se pudo:", path, "->", e, ")")

          def rm_tree(path):
              # borra recursivamente una carpeta
              try:
                  f.cwd(path)
              except Exception as e:
                  print("  (carpeta no existe:", path, "->", e, ")"); return
              names = []
              try:
                  names = f.nlst()
              except Exception:
                  names = []
              for n in names:
                  base = n.split("/")[-1]
                  if base in (".", ".."):
                      continue
                  child = path + "/" + base
                  is_dir = False
                  try:
                      f.cwd(child); is_dir = True; f.cwd(path)
                  except Exception:
                      is_dir = False
                  if is_dir:
                      rm_tree(child)
                  else:
                      try:
                          f.delete(child); print("  borrado archivo:", child)
                      except Exception as e:
                          print("  (no se pudo:", child, "->", e, ")")
              try:
                  f.rmd(path); print("  borrada carpeta:", path)
              except Exception as e:
                  print("  (no se pudo borrar carpeta:", path, "->", e, ")")

          print("== Limpiando", ROOT, "==")
          rm_tree(ROOT + "/docs")
          rm_tree(ROOT + "/.claude")
          rm_file(ROOT + "/README.md")
          rm_file(ROOT + "/package-lock.json")
          rm_file(ROOT + "/.gitignore")

          print("\n== Contenido final del docroot ==")
          try:
              f.cwd(ROOT);
              for n in sorted(f.nlst()):
                  print("  ", n.split("/")[-1])
          except Exception as e:
              print("  no se pudo listar:", e)
          f.quit()
          PY
