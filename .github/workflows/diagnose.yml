name: Diagnostico FTP (temporal)

# Se lanza a mano desde la pestaña Actions. Solo lista el arbol del servidor
# para localizar el docroot real de picodavi.com. No sube ni borra nada.
on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Listar el arbol del servidor FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'PY'
          import ftplib, os
          h = os.environ["FTP_HOST"]; u = os.environ["FTP_USER"]; p = os.environ["FTP_PASSWORD"]
          f = ftplib.FTP_TLS()
          f.connect(h, 21, timeout=40)
          f.login(u, p)
          f.prot_p()
          print("PWD tras login:", f.pwd())

          def entries(path):
              out = []
              try:
                  f.cwd(path)
                  names = f.nlst()
                  for n in names:
                      base = n.split("/")[-1]
                      if base in (".", ".."):
                          continue
                      # ¿es carpeta? intentamos entrar
                      is_dir = False
                      cur = f.pwd()
                      try:
                          f.cwd(base); is_dir = True; f.cwd(cur)
                      except Exception:
                          is_dir = False
                      out.append((base, is_dir))
              except Exception as e:
                  print("  (no se pudo listar", path, "->", e, ")")
              return out

          def walk(path, depth, maxdepth=3):
              ents = entries(path)
              for base, is_dir in ents:
                  full = (path.rstrip("/") + "/" + base) if path != "/" else "/" + base
                  flag = ""
                  low = base.lower()
                  if low in ("index.html", ".htaccess", ".ftp-deploy-sync-state.json"):
                      flag = "   <== " + base
                  print("  " * depth + ("[D] " if is_dir else "    ") + full + flag)
                  if is_dir and depth < maxdepth and base not in ("node_modules", ".git", "assets", "lib", "css", "js"):
                      walk(full, depth + 1, maxdepth)

          for root in ["/", ".", "/public_html", "/domains", "/home"]:
              try:
                  f.cwd("/")
              except Exception:
                  pass
              print("\n===== ARBOL DESDE:", root, "=====")
              walk(root, 0, 3)
              break  # con "/" basta; el resto es fallback si "/" fallara

          f.quit()
          PY
